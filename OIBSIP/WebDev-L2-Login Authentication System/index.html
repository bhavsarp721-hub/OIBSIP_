<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Authentication System</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(135deg,#E8F0FE,#D6E4FF);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:400px;
    background:#ffffff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 12px 30px rgba(0,0,0,0.40);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    text-align:center;
    color:#1E3A8A;
    margin-bottom:25px;
    font-size:28px;
}

input{
    width:100%;
    padding:12px 15px;
    margin:10px 0;
    border:1px solid #C7D2FE;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#2563EB;
    box-shadow:0 0 8px rgba(37,99,235,.2);
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563EB;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1D4ED8;
    transform:translateY(-2px);
}

button:active{
    transform:scale(.98);
}

p{
    margin-top:18px;
    text-align:center;
    color:#555;
}

a{
    color:#2563EB;
    text-decoration:none;
    font-weight:600;
}

a:hover{
    text-decoration:underline;
}

.msg{
    text-align:center;
    margin-bottom:10px;
    font-size:14px;
    color:#DC2626;
    font-weight:600;
}

.ok{
    color:#16A34A;
}

.hidden{
    display:none;
}

#dash{
    text-align:center;
}

#dash p{
    margin:20px 0;
    font-size:18px;
}

#dash b{
    color:#2563EB;
}

@media(max-width:480px){

.card{
    width:90%;
    padding:25px;
}

h2{
    font-size:24px;
}

input,
button{
    font-size:14px;
}
}
</style>
</head>
<body>
<div class="card">
<div id="reg">
<h2>Register</h2>
<div id=rmsg class=msg></div>
<input id=ru placeholder=Username>
<input id=re placeholder=Email>
<input id=rp type=password placeholder="Password (min 8 chars, 1 number)">
<input id=rc type=password placeholder="Confirm Password">
<button onclick="register()">Register</button>
<p>Already registered? <a onclick="show('log')">Login</a></p>
</div>
<div id="log" class="hidden">
<h2>Login</h2>
<div id=lmsg class=msg></div>
<input id=lu placeholder="Username or Email">
<input id=lp type=password placeholder=Password>
<button onclick="login()">Login</button>
<p>No account? <a onclick="show('reg')">Register</a></p>
</div>
<div id="dash" class="hidden">
<h2>Dashboard</h2>
<p>Welcome To DashBoard !!! <b id=name></b></p>
<button onclick="logout()">Logout</button>
</div>
</div>
<script>
function show(id)
{['reg','log','dash'].forEach(x=>document.getElementById(x).classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');}
async function hash(t)
{const b=new TextEncoder().encode(t);
const h=await crypto.subtle.digest('SHA-256',b);
return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,'0')).join('')
}
function users()
{
return JSON.parse(localStorage.getItem('users')||'[]')
}
function save(u)
{
localStorage.setItem('users',JSON.stringify(u))
}
async function register()
{
let u=ru.value.trim(),e=re.value.trim(),p=rp.value,c=rc.value,m=rmsg;
m.className='msg';
m.textContent='';
if(!u||!e||!p||!c)
{
m.textContent='Fill all fields';
return;
}
if(p.length<8||!/[0-9]/.test(p))
{
m.textContent='Password must be at least 8 characters and contain 1 number';
return;
}
if(p!==c)
{
m.textContent='Passwords do not match';
return;
}
let arr=users();
if(arr.some(x=>x.username===u||x.email===e))
{
m.textContent='Username or Email already exists';
return;
}
arr.push({username:u,email:e,password:await hash(p)});
save(arr);
m.className='msg ok';
m.textContent='Registered successfully';
setTimeout(()=>show('log'),800)
}
async function login()
{
let id=lu.value.trim(),
p=lp.value,
m=lmsg;
m.textContent='';
if(!id||!p)
{
m.textContent='Fill all fields';
return;
}
let h=await hash(p),
u=users().find(x=>(x.username===id||x.email===id)&&x.password===h);
if(!u)
{
m.textContent='Invalid username/email or password';
return;
}
localStorage.setItem('session',JSON.stringify(u));name.textContent=u.username;show('dash');
}
function logout()
{localStorage.removeItem('session');
show('log')}
let s=localStorage.getItem('session');
if(s)
{
name.textContent=JSON.parse(s).username;show('dash')
}
</script>
</body>
</html>
